# This file defines a CI/CD pipeline using GitHub Actions.
# CI/CD stands for Continuous Integration / Continuous Deployment.
# Every time you push code to the 'main' branch, GitHub automatically runs
# this workflow on a cloud machine to build and deploy your app to Azure.

# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

# The name that appears in the GitHub Actions tab of your repository.
name: Build and deploy Node.js app to Azure Web App - reading-buddy-2

# 'on' defines what events trigger this workflow.
on:
  push:
    branches:
      - main          # Runs automatically whenever you push commits to the main branch.
  workflow_dispatch:  # Also allows you to manually trigger this workflow from the GitHub UI.

jobs:

  # ============================================================
  # JOB 1: BUILD
  # Installs dependencies, compiles TypeScript, and packages
  # the output into an artifact ready for deployment.
  # ============================================================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Download your repository's code onto the runner machine.
      - uses: actions/checkout@v4

      # Install pnpm FIRST, before Node.js setup.
      # pnpm must exist before setup-node runs — otherwise setup-node
      # falls back to npm, which this project's preinstall script rejects.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      # Install Node.js 22. Runs after pnpm so it can use pnpm for caching.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # Install all third-party libraries across the monorepo.
      - name: Install dependencies
        run: pnpm install

      # Build the frontend (Vite) and backend (esbuild).
      # NODE_ENV=production tells build tools to optimize output.
      # PORT and BASE_PATH are required by the Vite config.
      - name: Build
        run: pnpm -r --if-present run build
        env:
          NODE_ENV: production
          PORT: "3000"
          BASE_PATH: "/"

      # Copy only the compiled output into a clean deploy/ folder.
      # Azure only needs the built files, not the TypeScript source code.
      - name: Prepare deployment package
        run: |
          mkdir -p deploy/artifacts/api-server
          mkdir -p deploy/artifacts/reading-buddy
          cp -r artifacts/api-server/dist deploy/artifacts/api-server/dist
          cp -r artifacts/reading-buddy/dist deploy/artifacts/reading-buddy/dist

      # Upload the deploy/ folder so the deploy job can access it.
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy/

  # ============================================================
  # JOB 2: DEPLOY
  # Downloads the built artifact and pushes it to Azure.
  # ============================================================
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Download the deploy/ folder that the build job uploaded.
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # Push the files to Azure App Service.
      # The publish-profile secret is stored in GitHub repo Settings →
      # Secrets and variables → Actions. It is never stored in code.
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'reading-buddy-2'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_3370F419EA4E4C149976872D74731CFD }}
