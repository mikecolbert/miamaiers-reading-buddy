# This file defines a CI/CD pipeline using GitHub Actions.
# CI/CD stands for Continuous Integration / Continuous Deployment.
# Every time you push code to the 'main' branch, GitHub automatically runs
# this workflow on a cloud machine to build and deploy your app to Azure.

# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

# The name that appears in the GitHub Actions tab of your repository.
name: Build and deploy Node.js app to Azure Web App - miamaiers-reading-buddy-4

# 'on' defines what events trigger this workflow.
on:
  push:
    branches:
      - main # Runs automatically whenever you push commits to the main branch.
  workflow_dispatch: # Also allows you to manually trigger this workflow from the GitHub UI.

# A workflow is made up of one or more 'jobs'. Each job runs independently
# on its own cloud machine (called a runner). This workflow has two jobs:
# 'build' (compile the code) and 'deploy' (send it to Azure).
jobs:
  # ============================================================
  # JOB 1: BUILD
  # Installs dependencies, compiles TypeScript, and packages
  # the output into an artifact ready for deployment.
  # ============================================================
  build:
    runs-on: ubuntu-latest # GitHub spins up a fresh Ubuntu Linux virtual machine for this job.

    permissions:
      contents: read # This job only needs read access to your repository's code.

    steps:
      # Step 1: Download your repository's code onto the runner machine.
      # Without this, the runner has no idea what your project looks like.
      - uses: actions/checkout@v4

      # Step 2: Install pnpm FIRST, before Node.js setup.
      # pnpm must exist on the runner before setup-node runs, otherwise
      # setup-node falls back to npm which this project explicitly rejects.
      # 'run_install: false' prevents pnpm from auto-running install here —
      # we do that explicitly in Step 4.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      # Step 3: Install Node.js version 22 on the runner.
      # Runs AFTER pnpm is installed so setup-node can detect pnpm for caching.
      # Node.js is the JavaScript runtime that powers both the build tools
      # (Vite, esbuild) and the Express server at runtime on Azure.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      # Step 4: Install all third-party libraries (dependencies) listed in
      # every package.json file across the monorepo.
      # This downloads React, Express, Drizzle, Vite, esbuild, etc. into node_modules/.
      - name: Install dependencies
        run: pnpm install

      # Step 5: Build both the frontend and backend.
      # The '-r' flag means "run recursively in every package that has a build script".
      #
      # - artifacts/reading-buddy: Vite compiles React + TypeScript into plain
      #   HTML/CSS/JS files in artifacts/reading-buddy/dist/public/
      #
      # - artifacts/api-server: esbuild bundles the Express server + TypeScript
      #   into a single file at artifacts/api-server/dist/index.mjs
      #
      # The env vars (NODE_ENV, PORT, BASE_PATH) configure the build for production.
      - name: Build
        run: pnpm -r --if-present run build
        env:
          NODE_ENV: production # Tells the build tools to optimize for production (minify, strip debug code, etc.)
          PORT: "3000" # The port the Express server will listen on when running on Azure.
          BASE_PATH: "/" # The root URL path where the app is served.

      # Step 6: Copy only the compiled output into a clean 'deploy/' folder.
      # Azure only needs the built files, not the TypeScript source code.
      # This keeps the deployment package small and clean.
      - name: Prepare deployment package
        run: |
          mkdir -p deploy/artifacts/api-server
          mkdir -p deploy/artifacts/reading-buddy
          cp -r artifacts/api-server/dist deploy/artifacts/api-server/dist
          cp -r artifacts/reading-buddy/dist deploy/artifacts/reading-buddy/dist

      # Step 7: Upload the deploy/ folder as a named 'artifact'.
      # An artifact is a file or folder that GitHub saves from one job so
      # another job can download and use it. The 'deploy' job below will
      # download this package and send it to Azure.
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app # The name used to reference this artifact in the deploy job.
          path: deploy/ # The folder to upload.

  # ============================================================
  # JOB 2: DEPLOY
  # Downloads the built artifact from Job 1 and pushes it to
  # your Azure App Service.
  # ============================================================
  deploy:
    runs-on: ubuntu-latest # Another fresh Ubuntu machine for this job.

    needs: build # This job will not start until the 'build' job above completes successfully.

    steps:
      # Step 1: Download the artifact (the deploy/ folder) that the build job uploaded.
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app # Must match the artifact name used in the upload step above.

      # Step 2: Push the downloaded files to your Azure App Service.
      # The 'publish-profile' is a secret stored in your GitHub repository settings
      # (Settings → Secrets and variables → Actions). It contains credentials that
      # authorize GitHub to deploy to your Azure app. It is never stored in code.
      # Azure will receive the files and restart the Node.js server automatically.
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "miamaiers-reading-buddy-4" # The name of your Azure App Service resource.
          slot-name: "Production" # The deployment slot (Production = the live site).
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }} # The deployment credential, stored as a GitHub secret.
# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
